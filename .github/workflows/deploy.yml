name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        options:
          - dev
          - staging
          - production
        required: true
        type: choice
      aws-region:
        default: us-east-1
        description: AWS region
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ inputs.aws-region }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Synthesize CDK
        run: npx cdk synth -c stage=${{ inputs.environment }}

      - name: Deploy CDK
        run: npx cdk deploy aws-ts-lambda-template-${{ inputs.environment }} -c stage=${{ inputs.environment }} --require-approval never
